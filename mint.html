<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Segoe UI',sans-serif; background:#0a0e17; color:#e0e0e0; min-height:100vh; }
  header { background:linear-gradient(135deg,#1a1f2e,#0d1117); border-bottom:1px solid #2d333b; padding:14px 24px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; }
  header .left { display:flex; align-items:center; gap:16px; }
  header h1 { font-size:1.3rem; background:linear-gradient(90deg,#f0b90b,#f8d12f); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  header a { color:#8b949e; text-decoration:none; font-size:0.85rem; }
  header a:hover { color:#f0b90b; }
  .nav-links { display:flex; gap:16px; }
  .wallet-bar { display:flex; align-items:center; gap:10px; }
  .dot { width:8px; height:8px; border-radius:50%; background:#3d444d; display:inline-block; }
  .dot.green { background:#3fb950; }
  button { cursor:pointer; border:none; border-radius:8px; font-weight:600; }
  .btn-connect { background:#f0b90b; color:#000; padding:8px 18px; font-size:0.9rem; }
  .container { max-width:540px; margin:40px auto; padding:0 16px; }
  .card { background:#161b22; border:1px solid #30363d; border-radius:14px; padding:28px; margin-bottom:20px; }
  .card h2 { color:#f0b90b; font-size:1.1rem; margin-bottom:18px; }
  .row { display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid #21262d; font-size:0.9rem; }
  .row:last-child { border-bottom:none; }
  .row .label { color:#8b949e; }
  .row .value { color:#e0e0e0; font-weight:500; }
  .input-group { margin-bottom:16px; }
  .input-group label { display:block; color:#8b949e; font-size:0.85rem; margin-bottom:6px; }
  .input-group input { width:100%; background:#0d1117; border:1px solid #30363d; border-radius:8px; padding:12px; color:#e0e0e0; font-size:1rem; }
  .input-group input:focus { outline:none; border-color:#f0b90b; }
  .btn-mint { width:100%; background:linear-gradient(90deg,#f0b90b,#f8d12f); color:#000; padding:14px; font-size:1.05rem; margin-top:8px; }
  .btn-mint:disabled { opacity:0.5; cursor:not-allowed; }
  .status-msg { margin-top:14px; padding:12px; border-radius:8px; font-size:0.85rem; display:none; }
  .status-msg.ok { display:block; background:#0d2818; border:1px solid #238636; color:#3fb950; }
  .status-msg.err { display:block; background:#2d1010; border:1px solid #da3633; color:#f85149; }
  .status-msg.info { display:block; background:#0d1f3c; border:1px solid #1f6feb; color:#58a6ff; }
  .whitelist-check { background:#0d1117; border:1px solid #30363d; border-radius:8px; padding:12px; margin-top:12px; font-size:0.85rem; }
  .wl-yes { color:#3fb950; }
  .wl-no { color:#f85149; }
  #txLink { color:#58a6ff; text-decoration:none; }
  #txLink:hover { text-decoration:underline; }
  .hidden { display:none!important; }
</style>
</head>
<body>
<header>
  <div class="left">
    <h1>FairmintBSC</h1>
    <div class="nav-links">
      <a href="index.html">🏠 首页</a>
      <a href="deploy.html">📦 部署</a>
      <a href="admin.html">⚙️ 管理</a>
    </div>
  </div>
  <div class="wallet-bar">
    <span class="dot" id="walletDot"></span>
    <span id="walletAddr" style="font-size:0.85rem;color:#8b949e;">未连接</span>
    <button class="btn-connect" id="connectBtn" onclick="connectWallet()">连接钱包</button>
  </div>
</header>

<div class="container">
  <div class="card">
    <h2>🪙 Mint 铸造</h2>
    <div class="input-group">
      <label>合约地址</label>
      <input type="text" id="contractAddr" placeholder="0x..." />
    </div>
    <button onclick="loadContract()" style="background:#21262d;color:#e0e0e0;padding:8px 16px;font-size:0.85rem;width:100%;margin-bottom:16px;border:1px solid #30363d;">加载合约信息</button>
    <div id="contractInfo" style="display:none;">
      <div class="row"><span class="label">代币</span><span class="value" id="infoName">-</span></div>
      <div class="row"><span class="label">已铸造</span><span class="value" id="infoMinted">-</span></div>
      <div class="row"><span class="label">Mint 价格</span><span class="value" id="infoPrice">-</span></div>
      <div class="row"><span class="label">状态</span><span class="value" id="infoPaused">-</span></div>
      <div id="wlCheck" class="whitelist-check" style="display:none;"></div>
    </div>
  </div>

  <div class="card hidden" id="mintCard">
    <h2>参与铸造</h2>
    <div class="input-group">
      <label>发送 BNB 数量（固定）</label>
      <input type="text" id="mintAmount" readonly style="background:#161b22;cursor:not-allowed;" />
    </div>
    <div class="row"><span class="label">你将获得（估算）</span><span class="value" id="willGet">-</span></div>
    <button class="btn-mint" id="mintBtn" onclick="doMint()">Mint 铸造</button>
    <div class="status-msg" id="mintStatus"></div>
  </div>
</div>

let provider, signer, contract, userAddr;
let mintPriceWei = '0';

async function connectWallet() {
  if (!window.ethereum) { alert('请安装 MetaMask'); return; }
  const accounts = await window.ethereum.request({ method:'eth_requestAccounts' });
  userAddr = accounts[0];
  document.getElementById('walletDot').className = 'dot green';
  document.getElementById('walletAddr').textContent = userAddr.slice(0,6)+'...'+userAddr.slice(-4);
  document.getElementById('connectBtn').textContent = '已连接';
  document.getElementById('connectBtn').disabled = true;
}

async function loadContract() {
  const addr = document.getElementById('contractAddr').value.trim();
  if (!addr || !addr.startsWith('0x')) { showMsg('mintStatus','请输入有效合约地址','err'); return; }
  if (!window.ethereum) { alert('请先连接钱包'); return; }
  showMsg('mintStatus','加载中...','info');
  try {
    const ethers = await loadEthers();
    provider = new ethers.BrowserProvider(window.ethereum);
    signer = await provider.getSigner();
    contract = new ethers.Contract(addr, ABI, signer);

    const [name, symbol, minted, maxSupply, price, paused, wlOpen] = await Promise.all([
      contract.name(), contract.symbol(),
      contract.mintedCount(), contract.maxMintSupply(),
      contract.mintPrice(), contract.paused(),
      contract.whitelistOpen()
    ]);

    document.getElementById('infoName').textContent = name + ' (' + symbol + ')';
    document.getElementById('infoMinted').textContent = minted.toString() + ' / ' + maxSupply.toString();
    document.getElementById('infoPrice').textContent = ethers.formatEther(price) + ' BNB';
    document.getElementById('infoPaused').textContent = paused ? '⏸️ 已暂停' : '✅ 进行中';
    mintPriceWei = price.toString();

    if (wlOpen) {
      const isWL = await contract.whiteList(userAddr || await signer.getAddress());
      const wlDiv = document.getElementById('wlCheck');
      wlDiv.style.display = 'block';
      wlDiv.innerHTML = isWL ? '<span class="wl-yes">✅ 您在白名单中，可以 Mint</span>' : '<span class="wl-no">❌ 您不在白名单中</span>';
    }

    document.getElementById('contractInfo').style.display = 'block';
    document.getElementById('mintCard').classList.remove('hidden');
    document.getElementById('mintAmount').value = ethers.formatEther(price) + ' BNB';

    const totalSupply = await contract.totalSupply();
    const perMint = totalSupply / maxSupply;
    const userGet = perMint / 2n;
    document.getElementById('willGet').textContent = ethers.formatEther(userGet) + ' ' + symbol;

    showMsg('mintStatus','合约加载成功 ✓','ok');
  } catch (e) {
    showMsg('mintStatus','加载失败：' + (e.reason||e.message),'err');
  }
}

async function doMint() {
  if (!contract) { alert('请先加载合约'); return; }
  const btn = document.getElementById('mintBtn');
  btn.disabled = true;
  showMsg('mintStatus','发送交易中...','info');
  try {
    const tx = await contract.mint({ value: mintPriceWei });
    const net = await provider.getNetwork();
    const scan = net.chainId === 97n ? 'https://testnet.bscscan.com/tx/' : 'https://bscscan.com/tx/';
    showMsg('mintStatus','交易已发送，等待确认...<br><a id="txLink" href="' + scan + tx.hash + '" target="_blank">' + scan + tx.hash.slice(0,20) + '...</a>','info');
    const receipt = await tx.wait();
    showMsg('mintStatus','🎉 Mint 成功！<br><a id="txLink" href="' + scan + receipt.hash + '" target="_blank">' + scan + receipt.hash.slice(0,20) + '...</a>','ok');
    loadContract();
  } catch (e) {
    showMsg('mintStatus','Mint 失败：' + (e.reason||e.message),'err');
  }
  btn.disabled = false;
}

function showMsg(id, msg, type) {
  const el = document.getElementById(id);
  el.innerHTML = msg;
  el.className = 'status-msg ' + type;
}

function loadEthers() {
  return new Promise((resolve, reject) => {
    if (window.ethers) { resolve(window.ethers); return; }
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/ethers/6.9.0/ethers.umd.min.js';
    s.onload = () => resolve(window.ethers);
    s.onerror = reject;
    document.head.appendChild(s);
  });
}

if (window.ethereum) {
  window.ethereum.on('accountsChanged', () => location.reload());
}
