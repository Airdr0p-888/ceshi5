<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FairMintBSC - Mint 铸造</title>
<script src="https://cdn.jsdelivr.net/npm/ethers@6.13.5/dist/ethers.umd.min.js"></script>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Segoe UI',sans-serif; background:#0a0e17; color:#e0e0e0; min-height:100vh; }
  header { background:linear-gradient(135deg,#1a1f2e,#0d1117); border-bottom:1px solid #2d333b; padding:14px 24px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; }
  header .left { display:flex; align-items:center; gap:16px; }
  header h1 { font-size:1.3rem; background:linear-gradient(90deg,#f0b90b,#f8d12f); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  header a { color:#8b949e; text-decoration:none; font-size:0.85rem; }
  header a:hover { color:#f0b90b; }
  .nav-links { display:flex; gap:16px; }
  .wallet-bar { display:flex; align-items:center; gap:10px; }
  .dot { width:8px; height:8px; border-radius:50%; background:#3d444d; display:inline-block; }
  .dot.green { background:#3fb950; }
  button { cursor:pointer; border:none; border-radius:8px; font-weight:600; }
  .btn-connect { background:#f0b90b; color:#000; padding:8px 18px; font-size:0.9rem; }
  .container { max-width:540px; margin:40px auto; padding:0 16px; }
  .card { background:#161b22; border:1px solid #30363d; border-radius:14px; padding:28px; margin-bottom:20px; }
  .card h2 { color:#f0b90b; font-size:1.1rem; margin-bottom:18px; }
  .row { display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid #21262d; font-size:0.9rem; }
  .row:last-child { border-bottom:none; }
  .row .label { color:#8b949e; }
  .row .value { color:#e0e0e0; font-weight:500; }
  .input-group { margin-bottom:16px; }
  .input-group label { display:block; color:#8b949e; font-size:0.85rem; margin-bottom:6px; }
  .input-group input { width:100%; background:#0d1117; border:1px solid #30363d; border-radius:8px; padding:12px; color:#e0e0e0; font-size:1rem; }
  .input-group input:focus { outline:none; border-color:#f0b90b; }
  .btn-mint { width:100%; background:linear-gradient(90deg,#f0b90b,#f8d12f); color:#000; padding:14px; font-size:1.05rem; margin-top:8px; }
  .btn-mint:disabled { opacity:0.5; cursor:not-allowed; }
  .status-msg { margin-top:14px; padding:12px; border-radius:8px; font-size:0.85rem; display:none; }
  .status-msg.ok { display:block; background:#0d2818; border:1px solid #238636; color:#3fb950; }
  .status-msg.err { display:block; background:#2d1010; border:1px solid #da3633; color:#f85149; }
  .status-msg.info { display:block; background:#0d1f3c; border:1px solid #1f6feb; color:#58a6ff; }
  .whitelist-check { background:#0d1117; border:1px solid #30363d; border-radius:8px; padding:12px; margin-top:12px; font-size:0.85rem; }
  .wl-yes { color:#3fb950; }
  .wl-no { color:#f85149; }
  #txLink { color:#58a6ff; text-decoration:none; }
  #txLink:hover { text-decoration:underline; }
  .hidden { display:none!important; }
</style>
</head>
<body>
<header>
  <div class="left">
    <h1>FairMintBSC</h1>
    <div class="nav-links">
      <a href="index.html">← 首页</a>
      <a href="deploy.html">部署</a>
      <a href="admin.html">管理</a>
    </div>
  </div>
  <div class="wallet-bar">
    <span class="dot" id="netDot"></span>
    <span id="netLabel" style="font-size:0.85rem;color:#8b949e;">未连接</span>
    <button class="btn-connect" id="connectBtn" onclick="connectWallet()">连接钱包</button>
  </div>
</header>

<div class="container">
  <div class="card">
    <h2>加载合约</h2>
    <div class="input-group">
      <label>合约地址</label>
      <input type="text" id="contractAddr" placeholder="0x..." />
    </div>
    <button onclick="loadContract()" style="background:#21262d;color:#e0e0e0;padding:8px 16px;font-size:0.85rem;width:100%;margin-bottom:16px;border:1px solid #30363d;border-radius:8px;cursor:pointer;">加载合约信息</button>
    <div id="contractInfo" style="display:none;">
      <div class="row"><span class="label">代币</span><span class="value" id="infoName">-</span></div>
      <div class="row"><span class="label">已铸造</span><span class="value" id="infoMinted">-</span></div>
      <div class="row"><span class="label">Mint 价格</span><span class="value" id="infoPrice">-</span></div>
      <div class="row"><span class="label">状态</span><span class="value" id="infoPaused">-</span></div>
      <div id="wlCheck" class="whitelist-check" style="display:none;"></div>
    </div>
  </div>

  <div class="card hidden" id="mintCard">
    <h2>参与铸造</h2>
    <div class="input-group">
      <label>发送 BNB 数量（固定）</label>
      <input type="text" id="mintAmount" readonly style="background:#161b22;cursor:not-allowed;" />
    </div>
    <div class="row"><span class="label">你将获得（估算）</span><span class="value" id="willGet">-</span></div>
    <button class="btn-mint" id="mintBtn" onclick="doMint()">Mint 铸造</button>
    <div class="status-msg" id="mintStatus"></div>
  </div>
</div>

<script>

nt256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[{"internalType":"address","name":"spender","type":"address"},{"internalType":"uint256","name":"addedValue","type":"uint256"}],"name":"increaseAllowance","outputs":[{"internalType":"bool","name":"","type":"bool"}],"stateMutability":"nonpayable","type":"function"},{"inputs":[],"name":"manualOpenPool","outputs":[],"stateMutability":"nonpayable","type":"function"},{"inputs":[],"name":"marketingWallet","outputs":[{"internalType":"address","name":"","type":"address"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"maxMintSupply","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"minDivHoldAmount","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"mint","outputs":[],"stateMutability":"payable","type":"function"},{"inputs":[],"name":"mintPrice","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"mintedCount","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"name","outputs":[{"internalType":"string","name":"","type":"string"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"openMode","outputs":[{"internalType":"enum FairMintBSC.OpenMode","name":"","type":"uint8"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"openTime","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"owner","outputs":[{"internalType":"address","name":"","type":"address"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"pair","outputs":[{"internalType":"address","name":"","type":"address"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"pauseContract","outputs":[],"stateMutability":"nonpayable","type":"function"},{"inputs":[],"name":"paused","outputs":[{"internalType":"bool","name":"","type":"bool"}],"stateMutability":"view","type":"function"},{"inputs":[{"internalType":"address","name":"addr","type":"address"}],"name":"removeWhite","outputs":[],"stateMutability":"nonpayable","type":"function"},{"inputs":[],"name":"renounceOwnership","outputs":[],"stateMutability":"nonpayable","type":"function"},{"inputs":[],"name":"rescueBNB","outputs":[],"stateMutability":"nonpayable","type":"function"},{"inputs":[{"internalType":"address","name":"token","type":"address"},{"internalType":"uint256","name":"amount","type":"uint256"}],"name":"rescueToken","outputs":[],"stateMutability":"nonpayable","type":"function"},{"inputs":[],"name":"router","outputs":[{"internalType":"contract IPancakeSwapRouter","name":"","type":"address"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"sellTax","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[{"internalType":"bool","name":"autoSend","type":"bool"},{"internalType":"uint256","name":"minHold","type":"uint256"}],"name":"setDivConfig","outputs":[],"stateMutability":"nonpayable","type":"function"},{"inputs":[{"internalType":"address","name":"wallet","type":"address"}],"name":"setMarketingWallet","outputs":[],"stateMutability":"nonpayable","type":"function"},{"inputs":[{"internalType":"uint256","name":"newPrice","type":"uint256"},{"internalType":"uint256","name":"newMaxSupply","type":"uint256"}],"name":"setMintConfig","outputs":[],"stateMutability":"nonpayable","type":"function"},{"inputs":[{"internalType":"enum FairMintBSC.OpenMode","name":"mode","type":"uint8"}],"name":"setOpenMode","outputs":[],"stateMutability":"nonpayable","type":"function"},{"inputs":[{"internalType":"uint256","name":"timestamp","type":"uint256"}],"name":"setOpenTime","outputs":[],"stateMutability":"nonpayable","type":"function"},{"inputs":[{"internalType":"uint256","name":"_buy","type":"uint256"},{"internalType":"uint256","name":"_sell","type":"uint256"},{"internalType":"uint256","name":"threshold","type":"uint256"}],"name":"setTaxConfig","outputs":[],"stateMutability":"nonpayable","type":"function"},{"inputs":[{"internalType":"uint256","name":"mar","type":"uint256"},{"internalType":"uint256","name":"burn","type":"uint256"},{"internalType":"uint256","name":"lp","type":"uint256"},{"internalType":"uint256","name":"div","type":"uint256"}],"name":"setTaxRateSplit","outputs":[],"stateMutability":"nonpayable","type":"function"},{"inputs":[{"internalType":"bool","name":"open","type":"bool"}],"name":"setWhiteListSwitch","outputs":[],"stateMutability":"nonpayable","type":"function"},{"inputs":[],"name":"symbol","outputs":[{"internalType":"string","name":"","type":"string"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"taxBurnRate","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"taxDivRate","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"taxLpRate","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"taxMarketingRate","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"taxSwapThreshold","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"timerOpenCheck","outputs":[],"stateMutability":"nonpayable","type":"function"},{"inputs":[],"name":"totalSupply","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[{"internalType":"address","name":"to","type":"address"},{"internalType":"uint256","name":"amount","type":"uint256"}],"name":"transfer","outputs":[{"internalType":"bool","name":"","type":"bool"}],"stateMutability":"nonpayable","type":"function"},{"inputs":[{"internalType":"address","name":"from","type":"address"},{"internalType":"address","name":"to","type":"address"},{"internalType":"uint256","name":"amount","type":"uint256"}],"name":"transferFrom","outputs":[{"internalType":"bool","name":"","type":"bool"}],"stateMutability":"nonpayable","type":"function"},{"inputs":[{"internalType":"address","name":"newOwner","type":"address"}],"name":"transferOwnership","outputs":[],"stateMutability":"nonpayable","type":"function"},{"inputs":[],"name":"unpauseContract","outputs":[],"stateMutability":"nonpayable","type":"function"},{"inputs":[{"internalType":"address","name":"","type":"address"}],"name":"userClaimDebt","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[{"internalType":"address","name":"","type":"address"}],"name":"whiteList","outputs":[{"internalType":"bool","name":"","type":"bool"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"whitelistOpen","outputs":[{"internalType":"bool","name":"","type":"bool"}],"stateMutability":"view","type":"function"},{"stateMutability":"payable","type":"receive"}];

let provider, signer, contract, userAddr;
let mintPriceWei, symbol, maxSupply, totalSupply;

async function connectWallet() {
  if (!window.ethereum) { alert('请安装 MetaMask！'); return; }
  try {
    await window.ethereum.request({ method: 'eth_requestAccounts' });
    provider = new ethers.BrowserProvider(window.ethereum);
    signer = await provider.getSigner();
    userAddr = await signer.getAddress();
    document.getElementById('connectBtn').textContent = userAddr.slice(0,6) + '...' + userAddr.slice(-4);
    document.getElementById('connectBtn').disabled = true;
    document.getElementById('netDot').classList.add('green');
  } catch (e) { alert('连接失败：' + e.message); }
}

async function loadContract() {
  const addr = document.getElementById('contractAddr').value.trim();
  if (!addr || !addr.startsWith('0x')) { showMsg('mintStatus','请输入有效合约地址','err'); return; }
  if (!window.ethereum) { alert('请先连接钱包'); return; }
  if (!provider) { await connectWallet(); }
  try {
    contract = new ethers.Contract(addr, ABI, signer);
    const name = await contract.name();
    symbol = await contract.symbol();
    const minted = await contract.mintedCount();
    maxSupply = await contract.maxMintSupply();
    mintPriceWei = await contract.mintPrice();
    const paused = await contract.paused();
    totalSupply = await contract.totalSupply();

    document.getElementById('infoName').textContent = name + ' (' + symbol + ')';
    document.getElementById('infoMinted').textContent = minted.toString() + ' / ' + maxSupply.toString();
    document.getElementById('infoPrice').textContent = ethers.formatEther(mintPriceWei) + ' BNB';
    document.getElementById('infoPaused').textContent = paused ? '⏸ 已暂停' : '✅ 进行中';
    document.getElementById('contractInfo').style.display = 'block';
    document.getElementById('mintCard').classList.remove('hidden');
    document.getElementById('mintAmount').value = ethers.formatEther(mintPriceWei) + ' BNB';

    // 修复：正确计算 willGet（用 ethers.formatEther 格式化）
    const perMint = totalSupply / maxSupply;  // BigInt 除法
    const userGet = perMint / 2n;
    document.getElementById('willGet').textContent = parseFloat(ethers.formatEther(userGet)).toFixed(6) + ' ' + symbol;

    // 白名单检查
    const wlOpen = await contract.whitelistOpen();
    if (wlOpen) {
      const inWl = await contract.whiteList(userAddr);
      const wlEl = document.getElementById('wlCheck');
      wlEl.style.display = 'block';
      wlEl.innerHTML = inWl ? '<span class="wl-yes">✅ 您在白名单中，可以 Mint</span>' : '<span class="wl-no">❌ 您不在白名单中，无法 Mint</span>';
    }

    showMsg('mintStatus','合约加载成功 ✓','ok');
  } catch (e) {
    showMsg('mintStatus','加载失败：' + (e.reason||e.message),'err');
  }
}

function showMsg(id, msg, type) {
  const el = document.getElementById(id);
  el.className = 'status-msg ' + type;
  el.innerHTML = msg;
}

async function doMint() {
  if (!contract) { alert('请先加载合约'); return; }
  const btn = document.getElementById('mintBtn');
  btn.disabled = true;
  showMsg('mintStatus','准备发送交易...','info');
  try {
    const tx = await contract.mint({ value: mintPriceWei });
    showMsg('mintStatus','交易已发送，等待确认...<br><a id="txLink" href="' + (await provider.getNetwork()).chainId === 97n ? 'https://testnet.bscscan.com/tx/' : 'https://bscscan.com/tx/' + tx.hash + '" target="_blank">' + tx.hash.slice(0,20) + '...</a>','info');
    const receipt = await tx.wait();
    showMsg('mintStatus','🎉 Mint 成功！<br><a id="txLink" href="' + (await provider.getNetwork()).chainId === 97n ? 'https://testnet.bscscan.com/tx/' : 'https://bscscan.com/tx/' + receipt.hash + '" target="_blank">' + receipt.hash.slice(0,20) + '...</a>','ok');
    loadContract();
  } catch (e) {
    showMsg('mintStatus','Mint 失败：' + (e.reason||e.message),'err');
  } finally { btn.disabled = false; }
}
</script>
</body>
</html>
