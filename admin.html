<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Segoe UI',sans-serif; background:#0a0e17; color:#e0e0e0; min-height:100vh; }
  header { background:linear-gradient(135deg,#1a1f2e,#0d1117); border-bottom:1px solid #2d333b; padding:14px 24px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; }
  header .left { display:flex; align-items:center; gap:16px; }
  header h1 { font-size:1.3rem; background:linear-gradient(90deg,#f0b90b,#f8d12f); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  header a { color:#8b949e; text-decoration:none; font-size:0.85rem; }
  header a:hover { color:#f0b90b; }
  .nav-links { display:flex; gap:16px; }
  .wallet-bar { display:flex; align-items:center; gap:10px; }
  .dot { width:8px; height:8px; border-radius:50%; background:#3d444d; display:inline-block; }
  .dot.green { background:#3fb950; }
  button { cursor:pointer; border:none; border-radius:8px; font-weight:600; font-size:0.9rem; }
  .btn-connect { background:#f0b90b; color:#000; padding:8px 18px; }
  .container { max-width:1100px; margin:30px auto; padding:0 16px; }
  .card { background:#161b22; border:1px solid #30363d; border-radius:14px; padding:24px; margin-bottom:20px; }
  .card h2 { color:#f0b90b; font-size:1.05rem; margin-bottom:16px; padding-bottom:8px; border-bottom:1px solid #21262d; }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .grid3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }
  @media(max-width:640px) { .grid2,.grid3 { grid-template-columns:1fr; } }
  .input-group { margin-bottom:12px; }
  .input-group label { display:block; color:#8b949e; font-size:0.8rem; margin-bottom:4px; }
  .input-group input,.input-group select { width:100%; background:#0d1117; border:1px solid #30363d; border-radius:6px; padding:10px; color:#e0e0e0; font-size:0.9rem; }
  .input-group input:focus,.input-group select:focus { outline:none; border-color:#f0b90b; }
  .btn-action { background:#238636; color:#fff; padding:10px 18px; margin-top:8px; width:100%; }
  .btn-action.danger { background:#da3633; }
  .btn-action.warn { background:#9e6a03; }
  .btn-action.primary { background:#1f6feb; }
  .row { display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #21262d; font-size:0.85rem; }
  .row:last-child { border-bottom:none; }
  .row .label { color:#8b949e; }
  .row .value { color:#e0e0e0; font-weight:500; }
  .status-msg { margin-top:12px; padding:10px; border-radius:8px; font-size:0.82rem; display:none; }
  .status-msg.ok { display:block; background:#0d2818; border:1px solid #238636; color:#3fb950; }
  .status-msg.err { display:block; background:#2d1010; border:1px solid #da3633; color:#f85149; }
  .status-msg.info { display:block; background:#0d1f3c; border:1px solid #1f6feb; color:#58a6ff; }
  .tabs { display:flex; gap:0; margin-bottom:20px; border-bottom:1px solid #30363d; flex-wrap:wrap; }
  .tab { padding:10px 18px; cursor:pointer; color:#8b949e; font-size:0.9rem; border-bottom:2px solid transparent; }
  .tab.active { color:#f0b90b; border-bottom-color:#f0b90b; }
  .tab-content { display:none; }
  .tab-content.active { display:block; }
  #ownerCheck { padding:20px; text-align:center; }
  #mainPanel { display:none; }
  .contract-input { display:flex; gap:10px; margin-bottom:20px; }
  .contract-input input { flex:1; }
  .contract-input button { white-space:nowrap; }
  .btn-small { padding:6px 14px; font-size:0.82rem; background:#21262d; color:#e0e0e0; border:1px solid #30363d; }
</style>

<header>

 <div class="wallet-bar">

  </div>
</header>

<div class="container">

      <div class="tab" id="tab-btn-risk" onclick="switchTab('risk')">🛡️ 风控</div>
    </div>

    <!-- 仪表盘 -->
    <div class="tab-content active" id="tab-dashboard"></div>
    <!-- Mint 配置 -->
    <div class="tab-content" id="tab-mint"></div>
    <!-- 开盘控制 -->
    <div class="tab-content" id="tab-open"></div>
    <!-- 税收配置 -->
    <div class="tab-content" id="tab-tax"></div>
    <!-- 白名单 -->

    <!-- 分红 -->

</div>

let provider, signer, contract, userAddr, isOwner = false;
let taxSwapTimer = null, taxSwapAutoEnabled = false, taxSwapIntervalSec = 300;

// ========== 连接钱包 ==========
async function connectWallet() {
  if (!window.ethereum) { alert('请安装 MetaMask！'); return; }
  const accounts = await window.ethereum.request({ method:'eth_requestAccounts' });
  userAddr = accounts[0];
  document.getElementById('walletDot').className = 'dot green';
  document.getElementById('walletAddr').textContent = userAddr.slice(0,6)+'...'+userAddr.slice(-4);
  document.getElementById('connectBtn').textContent = '已连接';
  document.getElementById('connectBtn').disabled = true;
  if (document.getElementById('contractAddr').value.trim()) loadContract();
}

// ========== 加载合约 ==========
async function loadContract() {
  const addr = document.getElementById('contractAddr').value.trim();
  if (!addr) { alert('请输入合约地址'); return; }
  const ethers = await loadEthers();
  provider = new ethers.BrowserProvider(window.ethereum);
  signer = await provider.getSigner();
  contract = new ethers.Contract(addr, ABI, signer);
  try {
    const owner = await contract.owner();
    isOwner = owner.toLowerCase() === userAddr.toLowerCase();
    if (!isOwner) {
      document.getElementById('ownerCheck').innerHTML = '<p style="color:#f85149;">❌ 你不是 Owner，无法使用管理功能</p>';
      document.getElementById('mainPanel').style.display = 'none';
      return;
    }
    document.getElementById('ownerCheck').innerHTML = '<p style="color:#3fb950;">✅ Owner 验证通过，欢迎使用管理面板</p>';
    document.getElementById('mainPanel').style.display = 'block';
    switchTab('dashboard');
  } catch (e) {
    document.getElementById('ownerCheck').innerHTML = '<p style="color:#f85149;">加载失败：' + e.message + '</p>';
  }
}

// ========== Tab 切换 ==========
function switchTab(name) {
  // 离开税收 Tab 时暂停定时器，进入时恢复
  if (name !== 'tax' && taxSwapTimer) {
    clearInterval(taxSwapTimer);
    taxSwapTimer = null;
  }

  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  const btn = document.getElementById('tab-btn-' + name);
  if (btn) btn.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'dashboard') renderDashboard();
  if (name === 'mint') renderMintTab();
  if (name === 'open') renderOpenTab();
  if (name === 'tax') { renderTaxTab(); if (taxSwapAutoEnabled && !taxSwapTimer) startAutoTaxSwap(); }
  if (name === 'whitelist') renderWhitelistTab();
  if (name === 'dividend') renderDividendTab();
  if (name === 'risk') renderRiskTab();
}

async function setTaxConfig() {
  const ethers = await loadEthers();
  const buy = document.getElementById('buyTaxInput').value;
  const sell = document.getElementById('sellTaxInput').value;
  const threshold = document.getElementById('taxThresholdInput').value;
  if (!buy || !sell) return;
  const tx = await contract.setTaxConfig(buy, sell, threshold ? ethers.parseEther(threshold) : 0);
  await tx.wait();
  showMsg('taxStatus','✅ 税率已更新','ok','tab-tax');
}

async function setTaxRateSplit() {
  const ethers = await loadEthers();
  const mar = Number(document.getElementById('rateMar').value);
  const burn = Number(document.getElementById('rateBurn').value);
  const lp = Number(document.getElementById('rateLp').value);
  const div = 1000 - mar - burn - lp;
  if (mar + burn + lp + div !== 1000) { alert('总和必须为1000'); return; }
  const tx = await contract.setTaxRateSplit(mar, burn, lp, div);
  await tx.wait();
  showMsg('taxStatus','✅ 分配比例已更新（分红='+div+'‰）','ok','tab-tax');
}

async function triggerTaxSwap() {
  const ethers = await loadEthers();
  if (!contract) return alert('请先加载合约');
  try {
    const tx = await contract.triggerTaxSwap();
    showMsg('taxSwapStatus','⏳ 交易已提交，等待确认...','pending','tab-tax');
    await tx.wait();
    showMsg('taxSwapStatus','✅ 税收代币已兑换并分配完成！','ok','tab-tax');
    updateTaxTokenInfo();
  } catch(e) {
    showMsg('taxSwapStatus','❌ 兑换失败：'+(e.reason||e.message),'error','tab-tax');
  }
}

async function updateTaxTokenInfo() {
  try {
    const ethers = await loadEthers();
    const [balance, threshold, pairAddr] = await Promise.all([
      contract.balanceOf(contract.target),
      contract.taxSwapThreshold(),
      contract.pair()
    ]);
    const fmt = ethers.formatEther(balance);
    const tfmt = ethers.formatEther(threshold);
    document.getElementById('taxTokenInfo').textContent =
      '合约持有代币：'+Number(fmt).toFixed(4)+' / 阈值：'+Number(tfmt).toFixed(4)+
      (balance >= threshold ? ' ✅ 已达阈值' : ' ⏳ 未达阈值');

    // 池子状态
    const poolDiv = document.getElementById('poolStatus');
    const btnSwap = document.getElementById('btnTaxSwap');
    if (pairAddr === '0x0000000000000000000000000000000000000000') {
      poolDiv.innerHTML = '<span style="color:#f85149;">⚠️ 交易对未创建，税收兑换不可用。<br>请先在「开盘管理」Tab 中创建交易对（开盘加池）。</span>';
      if (btnSwap) { btnSwap.disabled = true; btnSwap.style.opacity = '0.5'; btnSwap.style.cursor = 'not-allowed'; }
    } else {
      poolDiv.innerHTML = '<span style="color:#3fb950;">✅ 交易对已创建：' + pairAddr.slice(0,6) + '...' + pairAddr.slice(-4) + '</span>';
      if (btnSwap) { btnSwap.disabled = false; btnSwap.style.opacity = '1'; btnSwap.style.cursor = 'pointer'; }
    }
  } catch(e) { document.getElementById('taxTokenInfo').textContent = '加载失败'; }
}

// ========== 自动税收兑换定时器 ==========
function toggleAutoTaxSwap() {
  const toggle = document.getElementById('autoTaxSwapToggle');
  if (toggle.checked) {
    startAutoTaxSwap();
  } else {
    stopAutoTaxSwap();
  }
}

function changeTaxSwapInterval() {
  taxSwapIntervalSec = parseInt(document.getElementById('autoTaxSwapInterval').value);
  if (taxSwapAutoEnabled) {
    // 重启定时器使新间隔生效
    stopAutoTaxSwap();
    startAutoTaxSwap();
  }
}

function startAutoTaxSwap() {
  taxSwapAutoEnabled = true;
  document.getElementById('autoTaxSwapToggle').checked = true;
  document.getElementById('autoTaxSwapStatus').textContent = '⏳ 自动兑换运行中（间隔 '+Math.floor(taxSwapIntervalSec/60)+' 分钟）';
  document.getElementById('autoTaxSwapStatus').style.color = '#3fb950';

  if (taxSwapTimer) clearInterval(taxSwapTimer);
  taxSwapTimer = setInterval(async () => {
    if (!contract || !taxSwapAutoEnabled) return;
    try {
      const [balance, threshold, pairAddr] = await Promise.all([
        contract.balanceOf(contract.target),
        contract.taxSwapThreshold(),
        contract.pair()
      ]);
      if (pairAddr === '0x0000000000000000000000000000000000000000') return;
      if (balance < threshold) return;

      const tx = await contract.triggerTaxSwap();
      await tx.wait();
      updateTaxTokenInfo();
    } catch(e) {
      // 静默失败，下次重试
    }
  }, taxSwapIntervalSec * 1000);
}

function stopAutoTaxSwap() {
  taxSwapAutoEnabled = false;
  document.getElementById('autoTaxSwapToggle').checked = false;
  document.getElementById('autoTaxSwapStatus').textContent = '⏸️ 自动兑换已关闭';
  document.getElementById('autoTaxSwapStatus').style.color = '#8b949e';
  if (taxSwapTimer) { clearInterval(taxSwapTimer); taxSwapTimer = null; }
}

async function toggleWhitelist() {
  const open = await contract.whitelistOpen();
  await contract.setWhiteListSwitch(!open);
  updateWLStatus();
}

async function addWhitelist() {
  const raw = document.getElementById('wlAddresses').value.trim();
  const addrs = raw.split(/[\n,\s]+/).filter(a => a.startsWith('0x'));
  if (addrs.length === 0) { alert('请输入有效地址'); return; }
  showMsg('wlStatus','发送中...','info','tab-whitelist');
  try {
    const tx = await contract.addWhite(addrs);
    await tx.wait();
    showMsg('wlStatus','✅ 已添加 '+addrs.length+' 个地址','ok','tab-whitelist');
  } catch (e) { showMsg('wlStatus','失败：'+(e.reason||e.message),'err','tab-whitelist'); }
}

// ========== 分红 ==========
async function renderDividendTab() {
  document.getElementById('tab-dividend').innerHTML = '<p style="color:#8b949e;">加载中...</p>';
  try {
    const ethers = await loadEthers();
    const [autoDiv, minHold, divPool, totalSupply, pairAddr, burnAddr] = await Promise.all([
      contract.autoDivSend(),
      contract.minDivHoldAmount(),
      contract.divPoolBNB(),
      contract.totalSupply(),
      contract.pair(),
      contract.BURN_WALLET()
    ]);
    const circ = totalSupply - (await contract.balanceOf(pairAddr)) - (await contract.balanceOf(burnAddr));
    const minHoldFmt = ethers.formatEther(minHold);
    const circFmt = ethers.formatEther(circ);
    const divPoolFmt = ethers.formatEther(divPool);
    const autoStr = autoDiv ? '<span style="color:#3fb950;">✅ 自动分红已开启</span>' : '<span style="color:#f0883e;">⚠️ 自动分红已关闭（需手动领取）</span>';
    const autoDivHint = autoDiv
      ? '每次转账时自动向交易双方派发分红 BNB'
      : '关闭时用户需在 Mint 页面手动调用 claimDividend() 领取分红';

    document.getElementById('tab-dividend').innerHTML = `
      <div class="card">
        <h2>🎁 分红状态</h2>
        <div class="row"><span class="label">分红池 BNB</span><span class="value">${Number(divPoolFmt).toFixed(6)} BNB</span></div>
        <div class="row"><span class="label">流通量（不含池子+黑洞）</span><span class="value">${Number(circFmt).toFixed(4)}</span></div>
        <div class="row"><span class="label">最低持币门槛</span><span class="value">${Number(minHoldFmt).toFixed(4)}</span></div>
        <div class="row"><span class="label">自动分红</span><span class="value">${autoStr}</span></div>
        <div style="color:#8b949e;font-size:0.8rem;margin-top:4px;">${autoDivHint}</div>
      </div>
      <div class="card">
        <h2>⚙️ 分红配置</h2>
        <div style="margin-bottom:12px;">
          <label style="color:#8b949e;font-size:0.85rem;">自动分红开关</label>
          <div style="margin-top:6px;">
            <button class="btn-small" onclick="setAutoDiv(true)" style="background:#238636;color:#fff;margin-right:8px;">开启自动</button>
            <button class="btn-small" onclick="setAutoDiv(false)" style="background:#21262d;color:#e0e0e0;border:1px solid #30363d;">关闭自动</button>
          </div>
        </div>
        <div class="input-group"><label>最低持币分红门槛（代币单位）</label><input type="text" id="minHoldInput" value="${minHold.toString()}" /></div>
        <button class="btn-action" onclick="setDivConfig()">更新分红配置</button>
        <hr style="border-color:#21262d;margin:16px 0;" />
        <button class="btn-action primary" onclick="claimDiv()">🎁 领取我的分红</button>
        <div id="divStatus" class="status-msg"></div>
      </div>`;
  } catch (e) {
    document.getElementById('tab-dividend').innerHTML = '<p style="color:#f85149;">加载失败：' + e.message + '</p>';
  }
}

async function setAutoDiv(auto) {
  const ethers = await loadEthers();
  const minHold = document.getElementById('minHoldInput').value;
  await contract.setDivConfig(auto, minHold ? minHold : 0);
  renderDividendTab();
}

async function claimDiv() {
  showMsg('divStatus','发送中...','info','tab-dividend');
  try {
    const tx = await contract.claimDividend();
    await tx.wait();
    showMsg('divStatus','✅ 分红领取成功','ok','tab-dividend');
  } catch (e) { showMsg('divStatus','失败：'+(e.reason||e.message),'err','tab-dividend'); }
}

// ========== 风控 ==========
function renderRiskTab() {
  document.getElementById('tab-risk').innerHTML = `
    <div class="card">
      <h2>🛡️ 合约暂停/恢复</h2>
      <button class="btn-action warn" onclick="pauseContract()" style="margin-right:8px;">暂停合约</button>
      <button class="btn-action" onclick="unpauseContract()" style="background:#238636;">恢复合约</button>
    </div>
    <div class="card">
      <h2>🚨 紧急提币</h2>
      <p style="color:#f85149;font-size:0.85rem;margin-bottom:12px;">⚠️ 警告：仅限紧急情况，提取合约内闲置 BNB/代币</p>
      <button class="btn-action danger" onclick="rescueBNB()">提取合约 BNB（不含分红池）</button>
      <div id="riskStatus" class="status-msg"></div>
    </div>
    <div class="card">
      <h2>💰 提取任意代币</h2>
      <p style="color:#f0b90b;font-size:0.85rem;margin-bottom:12px;">提取误转入合约或合约持有的任意 ERC20 代币（含本币）</p>
      <div class="input-group">
        <label>代币合约地址</label>
        <input id="rescueTokenAddr" type="text" placeholder="0x..." />
      </div>
      <div class="input-group">
        <label>提取数量（原始单位）</label>
        <input id="rescueTokenAmt" type="text" placeholder="1000000000000000000" />
      </div>
      <button class="btn-action danger" onclick="rescueToken()">提取代币</button>
      <div id="rescueTokenStatus" class="status-msg"></div>
    </div>`;
}

async function pauseContract() { await contract.pauseContract(); alert('已暂停'); }
async function unpauseContract() { await contract.unpauseContract(); alert('已恢复'); }
async function rescueBNB() {
  if (!confirm('确认提取合约 BNB？')) return;
  const tx = await contract.rescueBNB();
  await tx.wait();
  showMsg('riskStatus','✅ 提取成功','ok','tab-risk');
}
async function rescueToken() {
  const addr = document.getElementById('rescueTokenAddr').value.trim();
  const amt = document.getElementById('rescueTokenAmt').value.trim();
  if (!addr || !amt) { showMsg('rescueTokenStatus','请填写代币地址和数量','err','tab-risk'); return; }
  if (!confirm('确认提取 ' + amt + ' 个代币？(' + addr + ')')) return;
  const tx = await contract.rescueToken(addr, amt);
  await tx.wait();
  showMsg('rescueTokenStatus','✅ 代币提取成功','ok','tab-risk');
  showMsg('riskStatus','','','tab-risk');
}

// ========== 工具函数 ==========
function showMsg(id, msg, type, tabId) {
  const el = document.getElementById(id) || (tabId ? document.querySelector('#'+tabId+' .status-msg') : null);
  if (!el) return;
  el.innerHTML = msg;
  el.className = 'status-msg ' + type;
}

function loadEthers() {
  return new Promise((resolve, reject) => {
    if (window.ethers) { resolve(window.ethers); return; }
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/ethers/6.9.0/ethers.umd.min.js';
    s.onload = () => resolve(window.ethers);
    s.onerror = reject;
    document.head.appendChild(s);
  });
}

if (window.ethereum) {
  window.ethereum.on('accountsChanged', (accs) => { userAddr = accs[0]||null; if(contract) loadContract(); });
}

// ===== 从 URL 参数自动填入合约地址 =====
(function autoFillFromUrl() {
  const p = new URLSearchParams(location.search);
  const addr = p.get('contract');
  if (addr && addr.startsWith('0x')) {
    document.getElementById('contractAddr').value = addr;
  }
})();
</script>
